name: CI

on:
  push:
    branches: [master]   # branch pushes run via the pull_request event instead
  pull_request:

# Cancel superseded runs; don't stack/duplicate.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: these jobs only read the repo.
permissions:
  contents: read

jobs:
  test:
    name: devbox tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/test_devbox.sh

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # shellcheck is preinstalled on ubuntu-latest runners
      - run: shellcheck scripts/devbox scripts/devbox-bootstrap-identity.sh provision/bootstrap-devbox.sh tests/test_devbox.sh

  terraform:
    name: terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=provision fmt -check -recursive
      - run: terraform -chdir=provision init -backend=false -input=false
      - run: terraform -chdir=provision validate

  gitleaks:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the scan covers every commit
      - name: Install gitleaks
        run: |
          VER=$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep -oP '"tag_name": "v\K[^"]+')
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - run: gitleaks git . --no-banner
